# Alembic configuration for SecureOps AI.
# The database URL is injected dynamically in alembic/env.py from src.core.config.settings
# so that it always matches the same env vars used by the application.
#
# Usage:
#   uv run alembic upgrade head     # apply all migrations
#   uv run alembic downgrade -1     # roll back one
#   uv run alembic revision --autogenerate -m "describe change"

[alembic]
script_location = alembic
file_template = %%(rev)s_%%(slug)s
prepend_sys_path = .
# sqlalchemy.url is set in env.py — leave blank here.
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
